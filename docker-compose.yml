services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    env_file: .env
    depends_on:
      - db
      - redis
    networks:
      - youtube_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube_worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    env_file: .env
    command: php artisan queue:work --tries=3 --timeout=3600
    depends_on:
      - app
      - redis
    networks:
      - youtube_net

  web:
    image: nginx:alpine
    container_name: youtube_web
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - youtube_net

  db:
    image: postgres:15-alpine
    container_name: youtube_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - youtube_net

  redis:
    image: redis:alpine
    container_name: youtube_redis
    restart: unless-stopped
    networks:
      - youtube_net

networks:
  youtube_net:
    driver: bridge

volumes:
  pgdata:
