services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - downloads:/var/www/storage/app/downloads
      - app_storage:/var/www/storage/framework
      - app_logs:/var/www/storage/logs
    environment:
      APP_NAME: YoutubeDownloader
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8002}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-youtube_dl}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      - db
      - redis
    networks:
      - youtube_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube_worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - downloads:/var/www/storage/app/downloads
      - app_storage:/var/www/storage/framework
      - app_logs:/var/www/storage/logs
    environment:
      APP_NAME: YoutubeDownloader
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-youtube_dl}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    entrypoint: []
    command: ["bash", "-c", "until pg_isready -h db -p 5432 -U $${DB_USERNAME} 2>/dev/null; do sleep 2; done && for i in 1 2 3; do php artisan queue:work --sleep=3 --tries=3 --timeout=3600 & done && trap 'kill $$(jobs -p) 2>/dev/null; wait' SIGTERM SIGINT && wait"]
    depends_on:
      - db
      - redis
    networks:
      - youtube_net

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youtube_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - downloads:/var/www/storage/app/downloads
      - app_storage:/var/www/storage/framework
      - app_logs:/var/www/storage/logs
    environment:
      APP_NAME: YoutubeDownloader
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: "5432"
      DB_DATABASE: ${DB_DATABASE:-youtube_dl}
      DB_USERNAME: ${DB_USERNAME:-laravel}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      CACHE_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    entrypoint: []
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      - db
      - redis
    networks:
      - youtube_net

  web:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    container_name: youtube_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8002}:80"
    depends_on:
      - app
    networks:
      - youtube_net

  db:
    image: postgres:15-alpine
    container_name: youtube_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-youtube_dl}
      POSTGRES_USER: ${DB_USERNAME:-laravel}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - youtube_net

  redis:
    image: redis:alpine
    container_name: youtube_redis
    restart: unless-stopped
    networks:
      - youtube_net

networks:
  youtube_net:
    driver: bridge

volumes:
  pgdata:
  downloads:
  app_storage:
  app_logs:
